<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي | بلاك هورس وينر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Menu -->
        <aside class="sidebar">
            <div class="logo-container">
                <img src="logo.png" alt="Black Horse Winner Logo" class="logo">
                <h1 class="brand-name">بلاك هورس وينر</h1>
                <p class="brand-tagline">أكل صحي لحياة أفضل</p>
            </div>
            
            <div class="menu-container">
                <div class="main-menu-toggle" id="main-menu-toggle">
                    <h2>المنيو</h2>
                    <svg class="arrow" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
                <div id="menu-list" class="menu-list" style="display: none;">
                    <!-- Menu items will be injected here by JS -->
                </div>
            </div>

            <div class="contact-container">
                <h3>تواصل معنا</h3>
                <div class="contact-links">
                    <a href="https://www.snapchat.com/add/Blackhorse_g" target="_blank" class="contact-link">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 17.062c-2.3-1.026-3.714-3.181-3.714-5.597 0-2.88-2.37-5.215-5.286-5.215-2.916 0-5.286 2.335-5.286 5.215 0 2.416-1.415 4.571-3.714 5.597-.478.214-1 .442-1 .694 0 .428 1.571.428 1.571.428l1.357 1.83s1.286-1.83 2.643-1.83c1.357 0 1.928.915 3.428.915s2.071-.915 3.428-.915c1.357 0 2.643 1.83 2.643 1.83l1.357-1.83s1.571 0 1.571-.428c0-.252-.522-.48-1-.694z"></path></svg>
                        <span>سناب شات: Blackhorse_g</span>
                    </a>
                    <a href="https://www.tiktok.com/@healthyblackdiet" target="_blank" class="contact-link">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"></path></svg>
                        <span>تيك توك: healthyblackdiet</span>
                    </a>
                    <a href="tel:0595236529" class="contact-link phone-link">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                        <span>للطلبات: 0595236529</span>
                    </a>
                </div>
            </div>
            <div class="sidebar-overlay" id="sidebar-overlay"></div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <button id="menu-toggle" class="menu-toggle" aria-label="فتح القائمة">
                    <svg viewBox="0 0 24 24" width="28" height="28" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <h2>المساعد الذكي</h2>
                <p>اسألني عن السعرات الحرارية، المكونات، أو التوصيات!</p>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="message bot-message">
                    <div class="avatar"><img src="logo.png" alt="Bot"></div>
                    <div class="bubble">مرحباً! أنا المساعد الذكي لمطعم بلاك هورس وينر. كيف يمكنني مساعدتك في اختيار وجبتك الصحية اليوم؟</div>
                </div>
            </div>

            <div class="chat-input-container">
                <div id="image-preview-container" class="image-preview-container" style="display: none;">
                    <img id="image-preview" src="" alt="Preview">
                    <button type="button" id="remove-image" class="remove-image">✕</button>
                </div>
                <form id="chat-form" class="chat-form">
                    <label for="image-upload" class="upload-btn">
                        <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    </label>
                    <input type="file" id="image-upload" accept="image/*" style="display: none;">
                    <input type="text" id="chat-input" placeholder="اكتب رسالتك أو أرفق صورة..." autocomplete="off">
                    <button type="submit" class="send-btn">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
